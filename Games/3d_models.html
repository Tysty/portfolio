<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Chin Games</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="../styles.css" rel="stylesheet">
</head>
<body>
  <div id="star-container"></div>
  <img src="../Resources/snailcursor.gif" id="follower" width="128" height="64">
  <div id="navbar-placeholder"></div>
  <script>
  fetch('../navbar.html')
    .then(res => res.text())
    .then(text => {
      document.getElementById('navbar-placeholder').innerHTML = text;
    });
  </script>

  <div class="container mt-4 text-center">
    <div id="home">
      <br>
      <br>
      <br>
    <h1 class="staggered-fade text">3D Models</h1>
    <p style="font-size: 30px;" class="staggered-fade text">These are some 3D models I have made in Blender.</p>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            width: 33.33%;
            padding: 4px;
        }

        td img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
        cursor: pointer;
        }
        td img:hover {
            height: 100%;
            transform: scale(1.5);
            z-index: 10;
            position: relative;
        }
    </style>

    <table>
    <tr>
        <td><img src="../Resources/3dModel1.png" alt="..."></td>
        <td><img src="../Resources/3dModel2.png" alt="..."></td>
        <td><img src="../Resources/3dModel3.png" alt="..."></td>
    </tr>
    <tr>
        <td><img src="../Resources/3dModel5.png" alt="..."></td>
        <td><img src="../Resources/3dModel6.png" alt="..."></td>
        <td><img src="../Resources/3dModel7.png" alt="..."></td>
    </tr>
    <tr>
        <td><img src="../Resources/3dModel8.png" alt="..."></td>
        <td><img src="../Resources/3dModel9.png" alt="..."></td>
        <td><img src="../Resources/3dModel11.png" alt="..."></td>
    </tr>
    </table>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script.js"></script>
</body>
</html>
